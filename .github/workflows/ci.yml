name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  test:
    name: Test (Node ${{ matrix.node }} on ${{ matrix.os }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        node: [22]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js ${{ matrix.node }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Supply-chain audit
        if: matrix.os == 'ubuntu-latest' && matrix.node == 22
        run: npm run audit

      - name: Run tests
        run: npm test

      - name: Run coverage
        run: npm run coverage

      - name: Lint public docs
        if: matrix.os == 'ubuntu-latest' && matrix.node == 22
        run: npm run test:docs

      - name: Build npm package
        if: matrix.os == 'ubuntu-latest' && matrix.node == 22
        run: npm run build

      - name: Release smoke test
        if: matrix.os == 'ubuntu-latest' && matrix.node == 22
        run: npm run test:release

      - name: Upload package artifact
        if: matrix.os == 'ubuntu-latest' && matrix.node == 22
        uses: actions/upload-artifact@v7
        with:
          name: npm-package
          path: dist/*.tgz
          retention-days: 14

      - name: Upload coverage artifact
        if: matrix.os == 'ubuntu-latest' && matrix.node == 22
        uses: actions/upload-artifact@v7
        with:
          name: coverage-lcov
          path: coverage/lcov.info
          retention-days: 7

      - name: Check coverage threshold (≥95% lines)
        if: matrix.os == 'ubuntu-latest' && matrix.node == 22
        run: |
          # Extract line coverage percentage from native node coverage report
          # Format: "ℹ all files                  |  96.17 |    79.10 |   97.37 | "
          COVERAGE=$(npm run coverage 2>&1 | grep -i "all files" | head -1 | awk -F'|' '{gsub(/[^0-9.]/,"",$2); print $2}')
          echo "Line coverage: ${COVERAGE}%"
          # Use awk for float comparison (bash can't do floats)
          awk -v cov="${COVERAGE}" 'BEGIN {
            if (cov+0 < 95) {
              print "FAIL: Coverage " cov "% is below 95% threshold"
              exit 1
            } else {
              print "PASS: Coverage " cov "% meets >=95% threshold"
              exit 0
            }
          }'

      - name: Update coverage badge JSON
        if: matrix.os == 'ubuntu-latest' && matrix.node == 22 && github.ref == 'refs/heads/main'
        run: |
          COVERAGE=$(npm run coverage 2>&1 | grep -i "all files" | head -1 | awk -F'|' '{gsub(/[^0-9.]/,"",$2); print $2}')
          echo "Coverage: ${COVERAGE}%"
          # Determine badge color based on coverage level
          COLOR="red"
          if awk -v c="$COVERAGE" 'BEGIN{exit !(c+0 >= 95)}'; then COLOR="brightgreen"; fi
          if awk -v c="$COVERAGE" 'BEGIN{exit !(c+0 >= 90 && c+0 < 95)}'; then COLOR="yellow"; fi
          # Write shields.io endpoint JSON
          mkdir -p .github
          cat > .github/coverage-badge.json <<EOF
          {
            "schemaVersion": 1,
            "label": "coverage",
            "message": "${COVERAGE}%",
            "color": "${COLOR}"
          }
          EOF
          cat .github/coverage-badge.json

      - name: Commit coverage badge JSON
        if: matrix.os == 'ubuntu-latest' && matrix.node == 22 && github.ref == 'refs/heads/main'
        continue-on-error: true
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "chore: update coverage badge [skip ci]"
          file_pattern: .github/coverage-badge.json
          commit_user_name: github-actions[bot]
          commit_user_email: github-actions[bot]@users.noreply.github.com
