name: Auto Merge PRs

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Merge ready PRs automatically
        uses: actions/github-script@v9
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const run = context.payload.workflow_run;
            const prs = run.pull_requests || [];
            if (!prs.length) {
              core.info('workflow_run has no pull requests');
              return;
            }

            const requiredLabels = new Set(['auto-merge', 'status:ready']);
            const blockedLabels = new Set(['wip', 'do not merge', 'hold', 'blocked']);

            function normalizeLabel(label) {
              return typeof label?.name === 'string' ? label.name.toLowerCase() : '';
            }

            function hasRequiredLabels(prLabels) {
              const names = prLabels.map(normalizeLabel);
              for (const label of requiredLabels) {
                if (!names.includes(label)) {
                  return { ok: false, missing: label };
                }
              }
              for (const blocked of blockedLabels) {
                if (names.includes(blocked)) {
                  return { ok: false, blocked };
                }
              }
              return { ok: true };
            }

            for (const pr of prs) {
              if (!pr.number) {
                core.info('Skipping PR entry with no pull request number');
                continue;
              }

              const { data: fullPr } = await github.rest.pulls.get({
                owner,
                repo,
                pull_number: pr.number,
              });

              const labels = fullPr.labels || [];
              const labelsCheck = hasRequiredLabels(labels);

              if (fullPr.base?.ref !== 'main') {
                core.info(`Skipping PR #${fullPr.number}: not targeting main`);
                continue;
              }

              if (fullPr.state !== 'open' || fullPr.draft) {
                core.info(`Skipping PR #${fullPr.number}: not open or draft`);
                continue;
              }

              if (!labelsCheck.ok) {
                if (labelsCheck.missing) {
                  core.info(`Skipping PR #${fullPr.number}: missing required label '${labelsCheck.missing}'`);
                } else {
                  core.info(`Skipping PR #${fullPr.number}: blocked by label '${labelsCheck.blocked}'`);
                }
                continue;
              }

              if (fullPr.mergeable === false || fullPr.merged) {
                core.info(`Skipping PR #${fullPr.number}: mergeable=${fullPr.mergeable}, merged=${fullPr.merged}`);
                continue;
              }

              if (fullPr.mergeable_state && fullPr.mergeable_state !== 'clean') {
                core.info(`Skipping PR #${fullPr.number}: mergeable_state=${fullPr.mergeable_state}`);
                continue;
              }

              const latestReviews = await github.paginate(github.rest.pulls.listReviews, {
                owner,
                repo,
                pull_number: fullPr.number,
                per_page: 100,
              });

              const latestByUser = new Map();
              for (const review of latestReviews) {
                const userLogin = review.user?.login;
                if (!userLogin || review.state === 'COMMENTED') continue;
                const prev = latestByUser.get(userLogin);
                if (!prev || new Date(review.submitted_at) > new Date(prev.submitted_at)) {
                  latestByUser.set(userLogin, review);
                }
              }

              const latestStates = Array.from(latestByUser.values()).map((r) => r.state);
              if (latestStates.includes('CHANGES_REQUESTED')) {
                core.info(`Skipping PR #${fullPr.number}: changes requested by reviewer`);
                continue;
              }

              if (!latestStates.includes('APPROVED')) {
                core.info(`Skipping PR #${fullPr.number}: no approving review yet`);
                continue;
              }

              try {
                await github.rest.pulls.merge({
                  owner,
                  repo,
                  pull_number: fullPr.number,
                  merge_method: 'squash',
                  commit_title: `chore: auto-merge #${fullPr.number}`,
                  commit_message: 'Auto-merge by CI workflow',
                });
                core.info(`Merged PR #${fullPr.number}`);
              } catch (error) {
                core.warning(`Auto-merge failed for PR #${fullPr.number}: ${error.message}`);
              }
            }
