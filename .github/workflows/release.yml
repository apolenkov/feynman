name: Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run checks and build without publishing to npm"
        required: true
        default: true
        type: boolean

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    name: Build and publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Run release checks
        run: npm run ci

      - name: Resolve package release metadata
        id: release_metadata
        run: |
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          echo "package_name=$PACKAGE_NAME" >> "$GITHUB_OUTPUT"
          echo "package_version=$PACKAGE_VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$PACKAGE_VERSION" >> "$GITHUB_OUTPUT"
          CURRENT_TAG="v$PACKAGE_VERSION"
          PREVIOUS_TAG=$(git tag --sort=-creatordate --merged "$CURRENT_TAG" 2>/dev/null | awk 'NR==2')
          if [ -z "$PREVIOUS_TAG" ]; then
            PREVIOUS_TAG=$(git tag --sort=-creatordate --merged HEAD 2>/dev/null | awk 'NR==1')
          fi
          echo "current_tag=$CURRENT_TAG" >> "$GITHUB_OUTPUT"
          echo "previous_tag=$PREVIOUS_TAG" >> "$GITHUB_OUTPUT"

      - name: Generate changelog notes
        run: |
          VERSION='${{ steps.release_metadata.outputs.package_version }}'
          CURRENT_TAG='${{ steps.release_metadata.outputs.current_tag }}'
          PREVIOUS_TAG='${{ steps.release_metadata.outputs.previous_tag }}'
          CHANGELOG_SOURCE="$RUNNER_TEMP/changelog-source.md"

          if git cat-file -e "$CURRENT_TAG:CHANGELOG.md" 2>/dev/null; then
            git show "$CURRENT_TAG:CHANGELOG.md" > "$CHANGELOG_SOURCE"
          else
            cp CHANGELOG.md "$CHANGELOG_SOURCE"
          fi

          awk -v version="$VERSION" '
            $0 ~ "^## " version " " { found=1; next }
            found && /^## / { exit }
            found { print }
          ' "$CHANGELOG_SOURCE" > "$RUNNER_TEMP/release-notes.md"

          if [ ! -s "$RUNNER_TEMP/release-notes.md" ]; then
            {
              echo "## $VERSION"
              if [ -n "$PREVIOUS_TAG" ]; then
                echo "Changes since ${PREVIOUS_TAG}."
              else
                echo "Changes in $VERSION."
              fi
              echo
              echo "- Release published from package.json version $VERSION."
            } > "$RUNNER_TEMP/release-notes.md"
          fi

          cat "$RUNNER_TEMP/release-notes.md"

      - name: Build package artifact
        run: npm run build

      - name: Upload package artifact
        uses: actions/upload-artifact@v7
        with:
          name: npm-package
          path: dist/*.tgz
          retention-days: 30

      - name: Check npm version
        id: npm_version
        run: |
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          if npm view "$PACKAGE_NAME@$PACKAGE_VERSION" version >/dev/null 2>&1; then
            echo "published=true" >> "$GITHUB_OUTPUT"
            echo "$PACKAGE_NAME@$PACKAGE_VERSION is already published"
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
            echo "$PACKAGE_NAME@$PACKAGE_VERSION is not published yet"
          fi

      - name: Validate release tag matches package version
        if: github.event_name == 'release'
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          PACKAGE_TAG="v${PACKAGE_VERSION}"
          if [ "$RELEASE_TAG" != "$PACKAGE_TAG" ]; then
            echo "❌ Release tag mismatch: github=${RELEASE_TAG}, package=${PACKAGE_TAG}"
            exit 1
          fi
          echo "✅ Release tag matches package version: ${PACKAGE_TAG}"

      - name: Check npm publish token
        id: npm_token
        run: |
          if [ -n "${{ secrets.NPM_TOKEN }}" ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Require token for new release publish
        if: (github.event_name == 'release' || inputs.dry_run == false) && steps.npm_version.outputs.published != 'true'
        run: |
          if [ "${{ steps.npm_token.outputs.present }}" != "true" ]; then
            echo "❌ NPM_TOKEN is required for publishing a new release."
            echo "Set NPM_TOKEN in repository secrets and rerun release."
            exit 1
          fi

      - name: Update GitHub release notes
        if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && inputs.dry_run == false)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.release_metadata.outputs.tag }}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" --notes-file "$RUNNER_TEMP/release-notes.md"
          else
            gh release create "$TAG" \
              --notes-file "$RUNNER_TEMP/release-notes.md" \
              --title "${TAG#v}" \
              --target "$GITHUB_SHA"
          fi

      - name: Publish to npm
        if: (github.event_name == 'release' || inputs.dry_run == false) && steps.npm_version.outputs.published != 'true' && steps.npm_token.outputs.present == 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish "$(cat dist/TARBALL.txt)" --access public --provenance --ignore-scripts

      - name: Verify npm publish result
        if: (github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && inputs.dry_run == false)) && steps.npm_token.outputs.present == 'true'
        env:
          PACKAGE_NAME: ${{ steps.release_metadata.outputs.package_name }}
          PACKAGE_VERSION: ${{ steps.release_metadata.outputs.package_version }}
        run: |
          for attempt in 1 2 3 4 5; do
            if npm view "${PACKAGE_NAME}@${PACKAGE_VERSION}" version >/dev/null 2>&1; then
              echo "✅ npm publish verified: ${PACKAGE_NAME}@${PACKAGE_VERSION} is available."
              exit 0
            fi
            echo "⏳ waiting for npm metadata propagation (attempt ${attempt}/5)"
            sleep 5
          done

          echo "❌ npm publish verification failed for ${PACKAGE_NAME}@${PACKAGE_VERSION}."
          exit 1

      - name: Skip npm publish
        if: steps.npm_version.outputs.published == 'true' && steps.npm_token.outputs.present != 'true' && (github.event_name == 'release' || inputs.dry_run == false)
        run: |
          echo "⚠️ NPM_TOKEN is not configured; npm publish and verification were skipped."

      - name: Verify release package from npm registry
        if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && inputs.dry_run == false)
        env:
          PACKAGE_NAME: ${{ steps.release_metadata.outputs.package_name }}
          PACKAGE_VERSION: ${{ steps.release_metadata.outputs.package_version }}
        run: |
          npm run test:published

      - name: Dry-run publish
        if: github.event_name == 'workflow_dispatch' && inputs.dry_run == true
        run: npm publish "$(cat dist/TARBALL.txt)" --access public --dry-run --ignore-scripts
