name: Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run checks and build without publishing to npm"
        required: true
        default: true
        type: boolean

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    name: Build and publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Run release checks
        run: npm run ci

      - name: Generate changelog notes
        run: |
          npm run changelog
          awk '
            /^## / { seen++; if (seen > 1) exit }
            seen == 1 { print }
          ' CHANGELOG.md > "$RUNNER_TEMP/release-notes.md"
          cat "$RUNNER_TEMP/release-notes.md"

      - name: Build package artifact
        run: npm run build

      - name: Upload package artifact
        uses: actions/upload-artifact@v7
        with:
          name: npm-package
          path: dist/*.tgz
          retention-days: 30

      - name: Check npm version
        id: npm_version
        run: |
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          if npm view "$PACKAGE_NAME@$PACKAGE_VERSION" version >/dev/null 2>&1; then
            echo "published=true" >> "$GITHUB_OUTPUT"
            echo "$PACKAGE_NAME@$PACKAGE_VERSION is already published"
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
            echo "$PACKAGE_NAME@$PACKAGE_VERSION is not published yet"
          fi

      - name: Update GitHub release notes
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release edit "$GITHUB_REF_NAME" --notes-file "$RUNNER_TEMP/release-notes.md"

      - name: Publish to npm
        if: (github.event_name == 'release' || inputs.dry_run == false) && steps.npm_version.outputs.published != 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public --provenance --ignore-scripts

      - name: Dry-run publish
        if: github.event_name == 'workflow_dispatch' && inputs.dry_run == true
        run: npm publish --access public --dry-run --ignore-scripts
